name: fedora-atomic
description: Future reference profile for an atomic Linux workstation pattern
status: future_reference

device:
  os: fedora-atomic
  role: future
  risk_posture: controlled-experimental

local_runtimes:
  preferred:
    - tbd
  fallback: []

runtime_access:
  default: gateway
  direct_local_fallback: false
  direct_frontier_fallback: false
  direct_allowed_for:
    - ai-status
    - ai-bootstrap-check

providers:
  primary_frontier:
    - tbd

approved_workspaces: []

routing:
  default: local_first
  explain_routes: true
  require_confirmation_for_frontier: true

capabilities:
  planned:
    - model_gateway
    - local_runtime
    - routing_policy
    - secrets_management
    - cli_general_assistant
    - validation
    - model_fitness
    - chat_ui
  future:
    - cli_coding_assistant
    - agent_runner
    - rag_project_memory

secrets:
  source: bitwarden
  fallback: env_local
  required: []
  optional: []

context:
  allowed:
    - shared
    - project
  blocked:
    - work-sensitive

validation:
  required:
    - profile_loads
  optional:
    - gateway_config_exists
    - local_runtime_available
    - routing_config_exists

host_model:
  pattern: thin_host
  services: podman_first
  manual_state: minimise

notes:
  - This is a future/reference profile, not an active Milestone 1 implementation target.
  - It exists to keep the architecture honest about rebuildability.
  - Validation should not fail during Milestone 1 because this profile is not implemented.
