name: macos-work
description: Work AI workstation profile for MacBook Pro
status: active

device:
  os: macos
  role: work
  risk_posture: conservative

local_runtimes:
  preferred:
    - omlx
  fallback:
    - ollama

runtime_access:
  default: gateway
  direct_local_fallback: true
  direct_frontier_fallback: false
  direct_allowed_for:
    - ai-status
    - ai-bootstrap-check
    - ai-model-review

providers:
  approved_first:
    - gemini
    - cursor
  use_case_dependent:
    - anthropic
    - openai

approved_workspaces:
  - name: notebooklm
    purpose: source_grounded_research
    allowed_for:
      - work
      - internal
      - customer
    profile_scope: macos-work
    notes:
      - Use only within approved internal account context.
      - Treat as a research and synthesis workspace, not a gateway provider.
      - Do not use from windows-personal profile.
      - Do not commit customer material into this repo.

routing:
  default: local_first
  explain_routes: true
  require_confirmation_for_frontier: true
  approved_tools_first: true
  block_frontier_for:
    - restricted

capabilities:
  enabled:
    - model_gateway
    - local_runtime
    - routing_policy
    - secrets_management
    - cli_general_assistant
    - validation
  planned:
    - model_fitness
    - chat_ui
    - architecture_assistant
    - writing_assistant
    - cli_coding_assistant
    - research_assistant
  restricted:
    - agent_runner
    - rag_project_memory

secrets:
  source: bitwarden
  fallback: env_local
  required:
    - name: GEMINI_API_KEY
      ref: ai-lab/macos-work/GEMINI_API_KEY
  optional:
    - name: ANTHROPIC_API_KEY
      ref: ai-lab/macos-work/ANTHROPIC_API_KEY
    - name: OPENAI_API_KEY
      ref: ai-lab/macos-work/OPENAI_API_KEY

context:
  allowed:
    - work
    - work-sensitive
    - shared
    - project
  blocked:
    - personal

validation:
  required:
    - profile_loads
    - gateway_config_exists
    - local_runtime_available
    - required_secrets_available
    - routing_config_exists
  optional:
    - fallback_runtime_available
    - optional_provider_secrets_available

notes:
  - Gemini and Cursor are documented as the first-use AI tools for work profile.
  - NotebookLM is documented as an approved work research workspace where internal policy allows.
  - Anthropic and OpenAI are use-case dependent and subject to approval context.
  - Direct runtime access is limited to validation and model review workflows.
  - Work and work-sensitive context must not be available to personal workflows.
