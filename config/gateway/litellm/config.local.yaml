# LiteLLM local gateway configuration
#
# Milestone 1 proof config:
# - local-only
# - one proven model group
# - no frontier providers
# - no committed secrets
#
# Design note:
# - The stable interface is model_name: local-fast.
# - The backend model below is replaceable.
# - llama3.2:3b is the current local proof backend, not a permanent architecture decision.
# - Long-term model candidates are tracked in config/models/aliases.yaml.

model_list:
  - model_name: local-fast
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://host.containers.internal:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
