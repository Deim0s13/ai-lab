# LiteLLM local gateway configuration
#
# Local-only development gateway config.
#
# Design notes:
# - Gateway model groups are the stable project interface.
# - Backend models are replaceable.
# - local-fast remains the daily-use model group.
# - candidate-* aliases are for model fitness testing only.
# - Long-term model decisions are recorded in docs/model-fitness/README.md.

model_list:
  - model_name: local-fast
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://host.containers.internal:11434

  - model_name: local-fast-mlx
    litellm_params:
      model: openai/mlx-community/Llama-3.2-3B-Instruct-4bit
      api_base: http://host.containers.internal:8080/v1
      api_key: sk-local-mlx

  - model_name: candidate-llama32-3b
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://host.containers.internal:11434

  - model_name: candidate-llama31-8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.containers.internal:11434

  - model_name: candidate-mistral-7b
    litellm_params:
      model: ollama/mistral:7b
      api_base: http://host.containers.internal:11434

  - model_name: candidate-qwen35
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: http://host.containers.internal:11434

  - model_name: local-capable-mlx
    litellm_params:
      model: openai/Jackrong/MLX-Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-v2-4bit
      api_base: http://host.containers.internal:8081/v1
      api_key: sk-local-mlx

  - model_name: local-code-mlx
    litellm_params:
      model: openai/lmstudio-community/Qwen3-Coder-30B-A3B-Instruct-MLX-5bit
      api_base: http://host.containers.internal:8082/v1
      api_key: sk-local-mlx

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
